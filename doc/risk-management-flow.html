<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リスク管理フロー図</title>
  <style>
    body {
      font-family: "Meiryo", "Yu Gothic", sans-serif;
      background-color: #f5f7fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      margin: 0;
    }

    h1 {
      font-size: 1.4rem;
      color: #2c3e50;
      margin-bottom: 40px;
      letter-spacing: 0.05em;
    }

    .flow-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .box {
      width: 240px;
      padding: 18px 24px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      position: relative;
    }

    .box-number {
      font-size: 0.7rem;
      font-weight: bold;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      opacity: 0.75;
    }

    .box-title {
      font-size: 1.05rem;
      font-weight: bold;
    }

    .box-desc {
      font-size: 0.78rem;
      margin-top: 6px;
      opacity: 0.85;
      line-height: 1.5;
    }

    /* 各ステップの色 */
    .step-1 .box { background-color: #d6eaf8; border: 2px solid #2e86c1; color: #1a5276; }
    .step-2 .box { background-color: #d5f5e3; border: 2px solid #1e8449; color: #145a32; }
    .step-3 .box { background-color: #fef9e7; border: 2px solid #d4ac0d; color: #7d6608; }
    .step-4 .box { background-color: #fdebd0; border: 2px solid #ca6f1e; color: #784212; }
    .step-5 .box { background-color: #f5eef8; border: 2px solid #7d3c98; color: #4a235a; }

    /* 矢印 */
    .arrow {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 4px 0;
    }

    .arrow-line {
      width: 2px;
      height: 28px;
      background-color: #7f8c8d;
    }

    .arrow-head {
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 12px solid #7f8c8d;
    }

    /* ループ矢印（見直し → 抽出） */
    .loop-arrow {
      display: flex;
      align-items: center;
      margin-top: 20px;
      position: relative;
    }

    .loop-label {
      font-size: 0.75rem;
      color: #555;
      text-align: center;
      margin-top: 6px;
    }

    .loop-svg {
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <h1>リスク管理 概略フロー図</h1>

  <div class="flow-container">

    <!-- STEP 1 -->
    <div class="step step-1">
      <div class="box">
        <div class="box-number">STEP 1</div>
        <div class="box-title">リスクの抽出</div>
        <div class="box-desc">プロジェクトに潜在するリスクを<br>洗い出し、リスト化する</div>
      </div>
    </div>

    <div class="arrow"><div class="arrow-line"></div><div class="arrow-head"></div></div>

    <!-- STEP 2 -->
    <div class="step step-2">
      <div class="box">
        <div class="box-number">STEP 2</div>
        <div class="box-title">評価</div>
        <div class="box-desc">発生確率・影響度を分析し<br>優先度を決定する</div>
      </div>
    </div>

    <div class="arrow"><div class="arrow-line"></div><div class="arrow-head"></div></div>

    <!-- STEP 3 -->
    <div class="step step-3">
      <div class="box">
        <div class="box-number">STEP 3</div>
        <div class="box-title">対応計画の策定</div>
        <div class="box-desc">回避・軽減・転嫁・受容の<br>方針を決め、担当者を割り当てる</div>
      </div>
    </div>

    <div class="arrow"><div class="arrow-line"></div><div class="arrow-head"></div></div>

    <!-- STEP 4 -->
    <div class="step step-4">
      <div class="box">
        <div class="box-number">STEP 4</div>
        <div class="box-title">監視</div>
        <div class="box-desc">リスクの状態を定期的に追跡し<br>変化を記録する</div>
      </div>
    </div>

    <div class="arrow"><div class="arrow-line"></div><div class="arrow-head"></div></div>

    <!-- STEP 5 -->
    <div class="step step-5">
      <div class="box">
        <div class="box-number">STEP 5</div>
        <div class="box-title">見直し</div>
        <div class="box-desc">評価・対応策を再検討し<br>次サイクルへ反映する</div>
      </div>
    </div>

    <!-- ループ矢印（SVGで描画） -->
    <svg class="loop-svg" width="320" height="70" viewBox="0 0 320 70">
      <!-- 折れ線：右下 → 右 → 右上 → STEP1へ戻る -->
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#7f8c8d"/>
        </marker>
      </defs>
      <!-- 下辺 → 右端 → 上へ → STEP1の右端へ -->
      <path d="M 160 5 L 290 5 L 290 60 L 160 60"
            fill="none" stroke="#7f8c8d" stroke-width="2"
            stroke-dasharray="6,3"
            marker-end="url(#arrowhead)"/>
      <text x="164" y="42" font-size="11" fill="#666" font-family="Meiryo, sans-serif">
        新たなリスクが判明した場合はSTEP 1へ戻る
      </text>
    </svg>

  </div>

</body>
</html>
